services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: camera_surveillance
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d camera_surveillance"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/camera_surveillance?schema=public
      JWT_SECRET: change-me-in-production
      JWT_EXPIRES_IN: 7d
      WORKER_BASE_URL: http://worker:8001
      WORKER_API_KEY: dev-worker-secret
      CORS_ORIGIN: "*"
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      CAMERA_COMMANDS_QUEUE: camera.commands
      DETECTION_EVENTS_QUEUE: detection.events
      ALERT_DEDUP_WINDOW_SECONDS: 10
      ALERT_RATE_LIMIT_PER_CAMERA_PER_MINUTE: 6
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: sh -c "bunx prisma migrate deploy && bun run start"
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://localhost:4000/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ./worker
    environment:
      BACKEND_URL: http://backend:4000
      WORKER_API_KEY: dev-worker-secret
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      CAMERA_COMMANDS_QUEUE: camera.commands
      DETECTION_EVENTS_QUEUE: detection.events
      MODEL_PATH: yolov8n.pt
      CONFIDENCE_THRESHOLD: 0.45
      DETECTION_COOLDOWN_SECONDS: 5
      STATS_INTERVAL_SECONDS: 10
      SAMPLE_EVERY_N_FRAMES: 5
      MAX_CAMERAS_PER_WORKER: 10
    ports:
      - "8001:8001"
    depends_on:
      backend:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=3)"
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  mediamtx:
    image: bluenviron/mediamtx:latest
    ports:
      - "8554:8554"

volumes:
  postgres_data:
